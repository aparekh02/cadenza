# Cadenza locomotion config — Unitree Go1
# Physics specs are loaded automatically from cadenza.locomotion.robot_spec.GO1
# (joint limits, kinematics, gait params, safety thresholds, benchmarks)
# Only override here if you need non-default values.

robot_model: go1

topics:
  cmd_vel:       /cmd_vel
  joint_states:  /joint_states
  imu:           /imu/data
  foot_contact:  /foot_contact
  loco_command:  /cadenza/loco_command
  memory_update: /cadenza/memory_update

control:
  rate_hz:         50.0    # Hz — cadenza control loop
  stm_window:      50      # STM rolling window (frames)
  skill_alpha:     0.40    # skill waypoint blend weight
  terrain_alpha:   0.30    # terrain recommendation blend weight
  safety_priority: true    # safety rules always override vel commands

memory:
  snapshot: ""             # path/to/snapshot.json (leave empty for no memory)
  log_dir:  logs/go1       # experience JSONL log directory

groq:
  enabled:          true   # set false or remove GROQ_API_KEY to disable
  nav_interval_s:   5.0    # seconds between NavigatorAgent calls
  bench_interval_s: 15.0   # seconds between BenchmarkAgent calls

# Robot hardware params — used by RobotConfig (not robot_spec)
robot:
  n_joints:     12
  joint_names:
    - FL_hip
    - FL_thigh
    - FL_calf
    - FR_hip
    - FR_thigh
    - FR_calf
    - RL_hip
    - RL_thigh
    - RL_calf
    - RR_hip
    - RR_thigh
    - RR_calf
  max_speed_xy:  1.2       # m/s (Go1 flat benchmark)
  max_yaw_rate:  0.8       # rad/s
